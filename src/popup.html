<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=380" />
  <title>SecurePaid VPN</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="root" data-status="disconnected">
    <!-- Single consolidated header (mirrors mobile app/(tabs)/index.js header) -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark"><img src="icons/icon-48.png" alt="" width="22" height="22" /></span>
        <div class="brand-text-block">
          <div class="brand-name">Secure Paid <span class="brand-accent">VPN</span></div>
          <div class="brand-sub" id="brand-sub" hidden>Premium · Unlimited</div>
        </div>
      </div>
      <div class="header-right">
        <div class="status-pill" id="status-pill" hidden>
          <span class="dot"></span>
          <span class="status-pill-text">Disconnected</span>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Auth view (signed-out) -->
    <section id="view-auth" class="view hidden">
      <div class="hero">
        <img class="hero-orb" src="icons/icon-128.png" alt="" width="64" height="64" />
        <h1 class="hero-title">Welcome back</h1>
        <p class="hero-sub">Sign in with your SecurePaid account</p>
      </div>
      <form id="login-form" class="form">
        <div class="field">
          <span class="field-label">Email</span>
          <span class="field-input">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
          </span>
        </div>
        <div class="field">
          <span class="field-label">Password</span>
          <span class="field-input">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required minlength="8" />
          </span>
        </div>
        <div id="login-error" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn-primary" id="login-submit">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
          <span class="btn-label">Sign in</span>
        </button>
        <button type="button" class="btn btn-ghost" id="show-signup">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
          <span class="btn-label">Create account</span>
        </button>
        <a href="#" class="link" id="forgot-link">Forgot password?</a>
      </form>

      <form id="signup-form" class="form hidden">
        <div class="field">
          <span class="field-label">Name</span>
          <span class="field-input">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="signup-name" placeholder="Your name" autocomplete="name" required />
          </span>
        </div>
        <div class="field">
          <span class="field-label">Email</span>
          <span class="field-input">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required />
          </span>
        </div>
        <div class="field">
          <span class="field-label">Password</span>
          <span class="field-input">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
            <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" />
          </span>
          <span class="field-hint">8 characters minimum</span>
        </div>
        <div id="signup-error" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn-primary" id="signup-submit">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
          <span class="btn-label">Create account</span>
        </button>
        <button type="button" class="btn btn-ghost" id="show-login">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span class="btn-label">Back to sign in</span>
        </button>
      </form>
    </section>

    <!-- Locked (signed-in but not premium) -->
    <section id="view-locked" class="view hidden">
      <div class="hero">
        <img class="hero-orb hero-orb--locked" src="icons/icon-128.png" alt="" width="64" height="64" />
        <h1 class="hero-title">Subscription required</h1>
        <p class="hero-sub">Choose a plan to start protecting your browser traffic.</p>
      </div>
      <div class="actions stack">
        <button id="open-pricing" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l2.4 7.4H22l-6 4.6L18.4 22 12 17.4 5.6 22l2.4-8L2 9.4h7.6z"/></svg>
          <span class="btn-label">View plans</span>
        </button>
        <button id="locked-refresh" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0115.5-6.4M21 4v6h-6M21 12a9 9 0 01-15.5 6.4M3 20v-6h6"/></svg>
          <span class="btn-label">I just subscribed — refresh</span>
        </button>
        <button id="locked-logout" class="link link-danger">Sign out</button>
      </div>
    </section>

    <!-- Main connect view -->
    <section id="view-main" class="view hidden">
      <div class="connect-area">
        <button id="connect-btn" class="connect-orb" disabled>
          <span class="connect-aura"></span>
          <span class="connect-ring connect-ring-1"></span>
          <span class="connect-ring connect-ring-2"></span>
          <span class="connect-bezel">
            <span class="connect-orb-inner">
              <svg class="connect-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2v10"/>
                <path d="M18.4 6.6a9 9 0 11-12.8 0"/>
              </svg>
              <span class="connect-label">Tap to Connect</span>
            </span>
          </span>
        </button>
      </div>

      <button class="server-picker" id="server-picker">
        <span class="status-flag" id="status-flag">🌐</span>
        <span class="picker-meta">
          <span class="picker-eyebrow">Selected Location</span>
          <span class="picker-city" id="status-name">No location selected</span>
          <span class="picker-sub" id="status-sub">Choose a server below</span>
        </span>
        <svg class="picker-chevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <div class="status-error" id="status-error" hidden></div>

      <div class="server-list-header">
        <span>Servers</span>
        <button id="refresh-servers" class="link" title="Refresh server list">Refresh</button>
      </div>
      <ul class="server-list" id="server-list" aria-label="VPN server list"></ul>

      <footer class="footer">
        <span class="footer-user" id="footer-user"></span>
        <button id="footer-settings" class="link">Settings</button>
      </footer>
    </section>

    <!-- Boot/loading -->
    <section id="view-loading" class="view loading">
      <div class="spinner" aria-label="Loading"></div>
    </section>
  </div>

  <script src="lib/browser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
